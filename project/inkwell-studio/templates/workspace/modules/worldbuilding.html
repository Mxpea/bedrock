<section class="workspace-panel worldview-panel-v2">
    <div class="worldview-v2" id="worldview-v2-app" data-api-base="/api/worldview-entries/" data-workspace-id="{{ workspace.public_id }}">
        <aside class="worldview-v2-sidebar">
            <div class="worldview-v2-toolbar">
                <input id="wv-search" type="search" placeholder="搜索词条 / 别名 / 正文...">
                <div class="worldview-v2-toolbar-actions">
                    <button id="wv-create" type="button" class="button primary">+ 新建词条</button>
                    <button id="wv-open-search" type="button" class="button secondary">强检索中心</button>
                </div>
            </div>

            <div class="worldview-v2-filters">
                <div class="worldview-v2-folders-head">
                    <h4>文档目录</h4>
                    <button id="wv-create-folder" type="button" class="button secondary">+ 新建文件夹</button>
                </div>
                <div id="wv-folder-tree" class="worldview-v2-folder-tree"></div>

                <h4>分类</h4>
                <div id="wv-categories" class="worldview-v2-chip-list"></div>

                <h4>标签</h4>
                <div id="wv-tags" class="worldview-v2-chip-list"></div>
            </div>

            <div class="worldview-v2-results-wrap">
                <div class="worldview-v2-results-head">
                    <strong>词条列表</strong>
                    <span id="wv-count" class="text-muted">0</span>
                </div>
                <div id="wv-results" class="worldview-v2-results"></div>
            </div>
        </aside>

        <main class="worldview-v2-editor">
            <header class="worldview-v2-editor-head">
                <input id="wv-name" type="text" placeholder="词条名，例如：永夜城">
                <div class="worldview-v2-editor-actions">
                    <button id="wv-delete" type="button" class="button secondary">删除</button>
                    <button id="wv-save" type="button" class="button primary">保存</button>
                </div>
            </header>

            <section class="worldview-v2-meta-grid">
                <label>
                    <span>分类</span>
                    <input id="wv-category" type="text" placeholder="地点 / 人物 / 规则...">
                </label>
                <label>
                    <span>别名（逗号分隔）</span>
                    <input id="wv-aliases" type="text" placeholder="夜都, The Dark City">
                </label>
                <label>
                    <span>所属目录</span>
                    <input id="wv-folder-path" type="text" placeholder="如：地点/王都/核心区">
                </label>
                <label class="worldview-v2-meta-full">
                    <span>标签（逗号分隔）</span>
                    <input id="wv-tags-input" type="text" placeholder="极寒地带, 上古遗迹">
                </label>
            </section>

            <section class="worldview-v2-props">
                <div class="worldview-v2-props-head">
                    <h3>属性（Properties）</h3>
                    <button id="wv-add-prop" type="button" class="button secondary">+ 添加属性</button>
                </div>
                <div id="wv-props" class="worldview-v2-props-list"></div>
            </section>

            <section class="worldview-v2-content">
                <div class="worldview-v2-content-head">
                    <h3>正文（Markdown）</h3>
                    <div class="worldview-v2-content-mode">
                        <button id="wv-content-view" type="button" class="button secondary active">查看渲染</button>
                        <button id="wv-content-edit" type="button" class="button secondary">编辑正文</button>
                    </div>
                </div>

                <div id="wv-md-toolbar" class="worldview-v2-md-toolbar" hidden>
                    <div class="worldview-v2-md-tools">
                        <button type="button" class="tool-btn txt-icon" id="wv-md-h1">H1</button>
                        <button type="button" class="tool-btn txt-icon" id="wv-md-bold"><span class="ms-icon" aria-hidden="true">format_bold</span></button>
                        <button type="button" class="tool-btn txt-icon" id="wv-md-italic"><span class="ms-icon" aria-hidden="true">format_italic</span></button>
                        <button type="button" class="tool-btn txt-icon" id="wv-md-list"><span class="ms-icon" aria-hidden="true">format_list_bulleted</span></button>
                        <button type="button" class="tool-btn txt-icon" id="wv-md-quote"><span class="ms-icon" aria-hidden="true">format_quote</span></button>
                        <button type="button" class="tool-btn txt-icon" id="wv-md-code"><span class="ms-icon" aria-hidden="true">code</span></button>
                    </div>
                    <div class="worldview-v2-md-tools">
                        <select id="wv-link-target" class="worldview-v2-md-select"></select>
                        <button type="button" class="tool-btn syntax-custom" id="wv-insert-link">+内链</button>
                        <select id="wv-backlink-target" class="worldview-v2-md-select"></select>
                        <button type="button" class="tool-btn syntax-custom" id="wv-insert-backlink">+反链</button>
                        <button type="button" class="tool-btn txt-icon" id="wv-upload-image"><span class="ms-icon" aria-hidden="true">image</span></button>
                        <input id="wv-image-input" type="file" accept="image/*" hidden>
                    </div>
                </div>

                <textarea id="wv-content" rows="16" placeholder="支持 [[词条名]] 语法建立双向链接" hidden></textarea>
                <div id="wv-content-preview" class="worldview-v2-content-preview"></div>
            </section>

            <section class="worldview-v2-backlinks">
                <h3>反向链接（Backlinks）</h3>
                <div id="wv-backlinks" class="worldview-v2-backlinks-list"></div>
            </section>

            <div id="wv-status" class="text-muted"></div>
        </main>

        <section id="wv-search-center" class="wv-search-center" hidden>
            <div class="wv-search-center-head">
                <h2>强检索中心</h2>
                <a id="wv-close-search" class="button secondary" href="/workspace/{{ workspace.public_id }}/worldbuilding/">返回编辑器</a>
            </div>

            <div class="wv-search-grid">
                <label>
                    <span>关键词</span>
                    <input id="wv-portal-keyword" type="search" placeholder="支持词条名、别名、正文、属性词检索">
                </label>
                <label>
                    <span>分类</span>
                    <input id="wv-portal-category" type="text" placeholder="如：地点">
                </label>
                <label>
                    <span>标签（逗号分隔）</span>
                    <input id="wv-portal-tags" type="text" placeholder="如：极寒地带, 上古遗迹">
                </label>
                <label>
                    <span>排序</span>
                    <select id="wv-portal-sort">
                        <option value="score">相关度优先</option>
                        <option value="updated">最近更新</option>
                        <option value="name">名称排序</option>
                    </select>
                </label>
            </div>

            <div class="wv-search-actions">
                <button id="wv-portal-run" type="button" class="button primary">开始检索</button>
                <button id="wv-portal-clear" type="button" class="button secondary">清空条件</button>
                <span id="wv-portal-count" class="text-muted">0 条结果</span>
            </div>

            <div id="wv-portal-results" class="wv-search-results"></div>
        </section>
    </div>
</section>

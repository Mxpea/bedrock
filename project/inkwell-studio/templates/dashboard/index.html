{% extends 'base.html' %}

{% block title %}工作台 - Bedrock{% endblock %}

{% block content %}
<section class="card card-wide workspace-hero">
    <p class="eyebrow">Workspace</p>
    <h1 class="dashboard-greeting">工作台</h1>
    <p class="lead">每个项目都是独立工作区，正文、大纲、人物和世界观彼此隔离，不再跨作品共享。</p>
    <div class="actions">
        <a class="button primary" href="#" onclick="createWorkspace(event)">+ 新建工作区</a>
        <a class="button secondary" href="/novels/">查看公开工作区</a>
    </div>
</section>

<section class="workspace-grid" data-workspace-list>
    <article class="card workspace-empty-card">
        <h2>正在加载工作区...</h2>
        <p>稍候将展示你的全部工作区和最近编辑状态。</p>
    </article>
</section>

<pre class="json-box" data-current-user style="display:none;"></pre>
{% endblock %}

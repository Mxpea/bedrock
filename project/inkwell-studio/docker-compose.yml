version: "3.9"

services:
  web:
    build: .
    command: sh scripts/entrypoint.sh
    env_file:
      - .env
    volumes:
      - ./:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    expose:
      - "8000"

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bedrock}
      POSTGRES_USER: ${POSTGRES_USER:-bedrock}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bedrock}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bedrock}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7

  celery:
    build: .
    command: celery -A config worker -l info
    env_file:
      - .env
    volumes:
      - ./:/app
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:1.27
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
